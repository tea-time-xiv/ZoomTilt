name: Build ZoomTilt

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  build:
    runs-on: windows-2022

    env:
      Solution_Name: ZoomTilt

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Read version from csproj
      run: |
        $version = ([xml](Get-Content "ZoomTilt/ZoomTilt.csproj")).Project.PropertyGroup.Version
        "VERSION=$version" >> $env:GITHUB_ENV

    - name: Check if release tag exists
      run: |
        git fetch --tags
        $tag = "v$env:VERSION"
        $exists = git tag -l $tag
        $skip = if ($exists) { "true" } else { "false" }
        "SKIP_RELEASE=$skip" >> $env:GITHUB_ENV

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: Package plugin
      run: |
        Push-Location ".\ZoomTilt\bin\x64\Release"
        Compress-Archive -Path "ZoomTilt.dll", "ZoomTilt.json" -DestinationPath "$env:GITHUB_WORKSPACE\ZoomTilt.zip"
        Pop-Location

    - name: Store artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ZoomTilt
        path: ZoomTilt.zip
        if-no-files-found: error
        retention-days: 1

    - name: Release
      if: github.event_name == 'push' && env.SKIP_RELEASE == 'false'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "ZoomTilt.zip"
        tag: v${{ env.VERSION }}
        name: ZoomTilt v${{ env.VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update pluginmaster
      if: github.event_name == 'push' && env.SKIP_RELEASE == 'false'
      shell: pwsh
      env:
        PLUGINMASTER_TOKEN: ${{ secrets.PLUGINMASTER_TOKEN }}
      run: |
        git clone https://x-access-token:$env:PLUGINMASTER_TOKEN@github.com/tea-time-xiv/pluginmaster.git pluginmaster-repo
        $version = $env:VERSION
        $downloadUrl = "https://github.com/tea-time-xiv/ZoomTilt/releases/download/v$version/ZoomTilt.zip"
        $newEntry = [ordered]@{
            InternalName        = "ZoomTilt"
            Name                = "ZoomTilt"
            Author              = "Tenrys"
            Punchline           = "Change 3rd person camera angle depending on camera zoom."
            Description         = "Change the 3rd person camera angle character config setting depending how zoomed in you are. Zoom out, and you will be able to see more of the world. Zoom in, the camera will be focused on your character."
            RepoUrl             = "https://github.com/tea-time-xiv/ZoomTilt"
            Version             = $version
            DalamudApiLevel     = 15
            ApplicableVersion   = "any"
            Tags                = @("zoom", "tilt", "camera")
            IsHide              = $false
            IsTestingExclusive  = $false
            DownloadLinkInstall = $downloadUrl
            DownloadLinkUpdate  = $downloadUrl
        }
        $existing = Get-Content "pluginmaster-repo/pluginmaster.json" | ConvertFrom-Json
        $filtered = @($existing | Where-Object { $_.InternalName -ne "ZoomTilt" })
        $merged = $filtered + @($newEntry)
        $json = $merged | ConvertTo-Json -Depth 3
        Set-Content "pluginmaster-repo/pluginmaster.json" $json -Encoding utf8NoBOM
        Push-Location pluginmaster-repo
        git symbolic-ref HEAD refs/heads/master
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pluginmaster.json
        git commit -m "Release ZoomTilt v$version"
        git push -u origin master
        Pop-Location
